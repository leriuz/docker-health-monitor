services:
  checker:
    build:
      context: ./healthcheck
      dockerfile: Dockerfile
    container_name: health-checker
    restart: unless-stopped
    volumes:
      - monitor-data:/data
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      - DB_PATH=/data/checks.db

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: health-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    volumes:
      - monitor-data:/data:ro
    environment:
      - DB_PATH=/data/checks.db
    depends_on:
      - checker

volumes:
  monitor-data:
